name: Build DEB Package

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'debian/**'
      - 'Makefile'
      - '.github/workflows/build-deb.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:bookworm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential \
            debhelper \
            dh-make \
            dpkg-dev \
            devscripts \
            gnupg \
            curl

      - name: Import GPG key
        run: |
          mkdir -p ~/.gnupg
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d > ~/.gnupg/private-key.asc
          gpg --import ~/.gnupg/private-key.asc
          rm ~/.gnupg/private-key.asc

      - name: Configure GPG
        run: |
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent || true
          gpgconf --launch gpg-agent

      - name: Build DEB package
        run: |
          dpkg-buildpackage -us -uc -b
          mkdir -p /tmp/debs
          cp ../bebznet-suite_*.deb /tmp/debs/

      - name: Sign DEB package
        run: |
          cd /tmp/debs
          for deb in *.deb; do
            dpkg-sig -k ${{ secrets.GPG_KEY_ID }} --sign builder "$deb" \
              --passphrase="${{ secrets.GPG_PASSPHRASE }}" || echo "Signing skipped for $deb"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: /tmp/debs/*.deb

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: /tmp/debs/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
