name: Deploy APT Repository to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'debian/**'
      - 'src/**'
      - '.github/workflows/deploy-apt-repo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install APT tools
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro gnupg curl

      - name: Import GPG key
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d > ~/.gnupg/private-key.asc
          gpg --batch --no-tty --import ~/.gnupg/private-key.asc 2>&1 || true
          rm ~/.gnupg/private-key.asc

      - name: Build DEB package locally
        run: |
          sudo apt-get install -y \
            build-essential \
            debhelper \
            dh-make \
            dpkg-dev \
            devscripts
          dpkg-buildpackage -us -uc -b
          mkdir -p /tmp/debs
          cp ../bebznet-suite_*.deb /tmp/debs/ || true

      - name: Create APT repository structure
        run: |
          mkdir -p /tmp/apt-repo/conf
          mkdir -p /tmp/apt-repo/pool/main
          
          cat > /tmp/apt-repo/conf/distributions << 'DISTEOF'
          Origin: FlyXOwl
          Label: bebznet-suite
          Suite: stable
          Codename: bookworm
          Architectures: amd64 arm64 i386
          Components: main
          Description: bebznet-suite Debian Repository
          DISTEOF

      - name: Add packages to repository
        run: |
          cd /tmp/apt-repo
          if [ -d /tmp/debs ] && [ "$(ls -A /tmp/debs 2>/dev/null)" ]; then
            for deb in /tmp/debs/*.deb; do
              echo "Adding $deb to repository..."
              reprepro -b . includedeb bookworm "$deb" || true
            done
          else
            echo "No .deb files found, creating empty repository"
          fi

      - name: Create index.html
        run: |
          cat > /tmp/apt-repo/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>bebznet-suite APT Repository</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 40px; }
              h1 { color: #333; }
              .section { margin: 20px 0; }
              code { background: #f4f4f4; padding: 10px; display: block; margin: 10px 0; }
              pre { background: #f4f4f4; padding: 15px; overflow-x: auto; }
            </style>
          </head>
          <body>
            <h1>bebznet-suite APT Repository</h1>
            
            <div class="section">
              <h2>Installation</h2>
              <p>Add the repository to your system:</p>
              <pre>
          # Add GPG key
          curl -fsSL https://raw.githubusercontent.com/FlyXOwl/apt-bebznet-suite/main/pubkey.gpg | sudo gpg --dearmor -o /usr/share/keyrings/bebznet-archive-keyring.gpg
          
          # Add repository
          CODENAME="$(. /etc/os-release && echo "$VERSION_CODENAME")"
          echo "deb [signed-by=/usr/share/keyrings/bebznet-archive-keyring.gpg] https://flyxowl.github.io/apt-bebznet-suite $CODENAME main" | sudo tee /etc/apt/sources.list.d/bebznet.list
          
          # Update and install
          sudo apt update
          sudo apt install bebznet-suite
              </pre>
            </div>

            <div class="section">
              <h2>Repository Contents</h2>
              <ul>
                <li><a href="dists/">dists/</a> - Distribution files</li>
                <li><a href="pool/">pool/</a> - Package pool</li>
              </ul>
            </div>

            <div class="section">
              <h2>About bebznet-suite</h2>
              <p>Complete Docker networking stack with:</p>
              <ul>
                <li>Pi-hole (DNS & Ad Blocking)</li>
                <li>Nginx (Reverse Proxy)</li>
                <li>WireGuard (VPN)</li>
                <li>Uptime Kuma (Monitoring)</li>
                <li>Portainer (Docker Management)</li>
                <li>CrowdSec (Security)</li>
                <li>Samba (File Sharing)</li>
                <li>FileBrowser (Web File Manager)</li>
              </ul>
            </div>

            <hr>
            <p>Repository: <a href="https://github.com/FlyXOwl/apt-bebznet-suite">FlyXOwl/apt-bebznet-suite</a></p>
          </body>
          </html>
          HTMLEOF

      - name: List repository contents
        run: |
          echo "=== Repository Structure ==="
          ls -laR /tmp/apt-repo/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          publish_dir: /tmp/apt-repo
          cname: false
          force_orphan: true
