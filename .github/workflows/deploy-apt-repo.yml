name: Deploy APT Repository to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'debian/**'
      - 'src/**'
      - '.github/workflows/deploy-apt-repo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install APT tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            reprepro \
            gnupg \
            curl \
            build-essential \
            debhelper \
            dh-make \
            dpkg-dev \
            devscripts

      - name: Build DEB package locally
        run: |
          dpkg-buildpackage -us -uc -b
          mkdir -p /tmp/debs
          cp ../bebznet-suite_*.deb /tmp/debs/ || true
          ls -lah /tmp/debs/

      - name: Create APT repository structure
        run: |
          mkdir -p /tmp/apt-repo/conf
          mkdir -p /tmp/apt-repo/db
          cat > /tmp/apt-repo/conf/distributions << 'DISTEOF'
          Origin: FlyXOwl
          Label: bebznet-suite
          Suite: stable
          Codename: bookworm
          Architectures: amd64 i386 arm64
          Components: main
          Description: bebznet-suite APT Repository
          DISTEOF
          echo "=== distributions file ==="
          cat /tmp/apt-repo/conf/distributions

      - name: Add packages to repository
        run: |
          cd /tmp/apt-repo
          echo "=== Checking .deb files ==="
          ls -lah /tmp/debs/
          if [ "$(ls -A /tmp/debs/*.deb 2>/dev/null)" ]; then
            for deb in /tmp/debs/*.deb; do
              echo "Processing: $deb"
              reprepro -Vb . includedeb bookworm "$deb" || echo "Error adding $deb"
            done
          fi
          echo "=== Exporting repository ==="
          reprepro -Vb . export bookworm || true
          echo ""
          echo "=== Repository structure after export ==="
          find /tmp/apt-repo -type f -o -type d | sort

      - name: Create index.html
        run: |
          mkdir -p /tmp/apt-repo
          cat > /tmp/apt-repo/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>bebznet-suite APT Repository</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
              h1 { color: #333; }
              .section { margin: 20px 0; background: white; padding: 20px; border-radius: 5px; }
              code { background: #f4f4f4; padding: 10px; display: block; margin: 10px 0; overflow-x: auto; }
              pre { background: #f4f4f4; padding: 15px; overflow-x: auto; border-radius: 3px; }
              a { color: #0066cc; text-decoration: none; }
              a:hover { text-decoration: underline; }
              .file-list { background: #f9f9f9; padding: 10px; border-left: 3px solid #0066cc; }
            </style>
          </head>
          <body>
            <h1>Dépôt APT bebznet-suite</h1>
            <div class="section">
              <h2>Installation</h2>
              <p>Ajoutez le dépôt à votre système Debian/Ubuntu :</p>
              <pre>
          # Ajouter la clé GPG
          curl -fsSL https://raw.githubusercontent.com/FlyXOwl/apt-bebznet-suite/main/pubkey.gpg | sudo gpg --dearmor -o /usr/share/keyrings/bebznet-archive-keyring.gpg

          # Ajouter le dépôt
          CODENAME="$(. /etc/os-release && echo "$VERSION_CODENAME")"
          echo "deb [signed-by=/usr/share/keyrings/bebznet-archive-keyring.gpg] https://flyxowl.github.io/apt-bebznet-suite $CODENAME main" | sudo tee /etc/apt/sources.list.d/bebznet.list

          # Mettre à jour et installer
          sudo apt update
          sudo apt install bebznet-suite
              </pre>
            </div>
            <div class="section">
              <h2>Structure du dépôt</h2>
              <div class="file-list">
                <p><strong>Répertoires disponibles :</strong></p>
                <ul>
                  <li><a href="dists/">dists/</a> - Métadonnées de distribution</li>
                  <li><a href="pool/">pool/</a> - Fichiers de paquets</li>
                </ul>
              </div>
            </div>
            <div class="section">
              <h2>À propos de bebznet-suite</h2>
              <p>Pile complète de réseau Docker incluant :</p>
              <ul>
                <li>Pi-hole (Filtrage DNS et blocage des annonces)</li>
                <li>Nginx (Proxy inverse et équilibreur de charge)</li>
                <li>WireGuard (Serveur VPN)</li>
                <li>Uptime Kuma (Surveillance et alertes)</li>
                <li>Portainer (Gestion des conteneurs Docker)</li>
                <li>CrowdSec (Détection et prévention des intrusions)</li>
                <li>Samba (Partage de fichiers)</li>
                <li>FileBrowser (Gestionnaire de fichiers Web)</li>
              </ul>
            </div>
            <hr>
            <p style="color: #666;">
              Dépôt : <a href="https://github.com/FlyXOwl/apt-bebznet-suite">FlyXOwl/apt-bebznet-suite</a><br>
              Dernière mise à jour : <span id="date"></span>
            </p>
            <script>
              document.getElementById('date').textContent = new Date().toLocaleString();
            </script>
          </body>
          </html>
          HTMLEOF

      - name: List final contents
        run: |
          echo "=== Final /tmp/apt-repo contents ==="
          ls -laR /tmp/apt-repo/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          publish_dir: /tmp/apt-repo
          cname: false
          force_orphan: true