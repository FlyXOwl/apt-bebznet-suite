name: Deploy APT Repository to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'debian/**'
      - 'src/**'
      - '.github/workflows/deploy-apt-repo.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install APT tools
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro gnupg curl

      - name: Import GPG key
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d > ~/.gnupg/private-key.asc
          gpg --batch --no-tty --import ~/.gnupg/private-key.asc 2>&1 || true
          rm ~/.gnupg/private-key.asc

      - name: Build DEB package locally
        run: |
          sudo apt-get install -y \
            build-essential \
            debhelper \
            dh-make \
            dpkg-dev \
            devscripts
          dpkg-buildpackage -us -uc -b
          mkdir -p /tmp/debs
          cp ../bebznet-suite_*.deb /tmp/debs/ || true

      - name: Create APT repository structure
        run: |
          mkdir -p /tmp/apt-repo/conf
          mkdir -p /tmp/apt-repo/pool/main
          
          cat > /tmp/apt-repo/conf/distributions << 'DISTEOF'
          Origin: FlyXOwl
          Label: bebznet-suite
          Suite: stable
          Codename: bookworm
          Architectures: amd64 arm64 i386
          Components: main
          Description: bebznet-suite Debian Repository
          SignWith: ${{ secrets.GPG_KEY_ID }}
          DISTEOF

      - name: Add packages to repository
        run: |
          cd /tmp/apt-repo
          if [ -d /tmp/debs ] && [ "$(ls -A /tmp/debs 2>/dev/null)" ]; then
            for deb in /tmp/debs/*.deb; do
              echo "Adding $deb to repository..."
              reprepro -b . includedeb bookworm "$deb" || echo "Warning: Could not add $deb"
            done
          else
            echo "No .deb files found"
          fi

      - name: Generate repository metadata
        run: |
          cd /tmp/apt-repo
          ls -la dists/ pool/ 2>/dev/null || echo "Repository structure created"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/apt-repo
          cname: false
