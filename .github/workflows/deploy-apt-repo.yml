name: Deploy APT Repository to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  REPO: /tmp/apt-repo
  DEBS: /tmp/debs

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies & build .deb
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential debhelper dpkg-dev devscripts gnupg apt-utils
          dpkg-buildpackage -us -uc -b
          mkdir -p "$DEBS"
          cp ../bebznet-suite_*.deb "$DEBS/" 2>/dev/null \
            || echo "::warning::No .deb packages were produced by the build"

      - name: Build APT repository
        run: |
          mkdir -p "$REPO/pool/main" "$REPO/dists/bookworm/main/binary-amd64"
          cp "$DEBS"/*.deb "$REPO/pool/main/" 2>/dev/null \
            || echo "::warning::No .deb packages found — repository will be empty"
          cd "$REPO"
          dpkg-scanpackages pool/main /dev/null \
            > dists/bookworm/main/binary-amd64/Packages
          gzip -k dists/bookworm/main/binary-amd64/Packages
          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin=FlyXOwl \
            -o APT::FTPArchive::Release::Label=bebznet-suite \
            -o APT::FTPArchive::Release::Suite=bookworm \
            -o APT::FTPArchive::Release::Codename=bookworm \
            -o APT::FTPArchive::Release::Architectures=amd64 \
            -o APT::FTPArchive::Release::Components=main \
            release dists/bookworm > dists/bookworm/Release

      - name: Generate web pages
        run: |
          # Copy static pages (index, pool/, dists/)
          cp -r .github/pages/. "$REPO/"

          # Shared CSS for directory listing pages
          PAGE_CSS=':root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--accent:#58a6ff;--text:#c9d1d9;--muted:#8b949e}*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;display:flex;flex-direction:column}header{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 28px;display:flex;align-items:center;gap:14px}header a{color:var(--accent);text-decoration:none;font-size:13px}header a:hover{text-decoration:underline}.sep{color:var(--border)}.current{color:var(--text);font-weight:600}main{max-width:760px;margin:40px auto;padding:0 20px;flex:1}h1{font-size:1.5rem;font-weight:700;color:#f0f6fc;margin-bottom:20px}.entry-list{border:1px solid var(--border);border-radius:10px;overflow:hidden}.entry{display:flex;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid var(--border);transition:background .15s}.entry:last-child{border-bottom:none}.entry:hover{background:var(--surface)}.entry-icon{font-size:20px}.entry a{color:var(--accent);text-decoration:none;font-size:14px;font-weight:500}.entry a:hover{text-decoration:underline}.entry-desc{color:var(--muted);font-size:12px;margin-top:2px}.entry-meta{color:var(--muted);font-size:12px;margin-top:2px;font-family:monospace}footer{text-align:center;padding:24px;border-top:1px solid var(--border);color:var(--muted);font-size:12px}footer a{color:var(--accent);text-decoration:none}.empty{padding:40px;text-align:center;color:var(--muted)}'

          # Dynamic dists/bookworm/index.html
          mkdir -p "$REPO/dists/bookworm"
          {
            printf '<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">'
            printf '<meta name="viewport" content="width=device-width,initial-scale=1.0">'
            printf '<title>dists/bookworm — bebznet-suite APT</title>'
            printf '<style>%s</style></head><body>' "$PAGE_CSS"
            printf '<header>'
            printf '<a href="../../">bebznet-suite APT</a><span class="sep">/</span>'
            printf '<a href="../">dists</a><span class="sep">/</span>'
            printf '<span class="current">bookworm</span>'
            printf '</header>'
            printf '<main><h1>📋 dists/bookworm</h1><div class="entry-list">'
            printf '<div class="entry"><span class="entry-icon">📄</span><div>'
            printf '<a href="Release">Release</a>'
            printf '<div class="entry-desc">Fichier de métadonnées APT</div></div></div>'
            printf '<div class="entry"><span class="entry-icon">📂</span><div>'
            printf '<a href="main/">main/</a>'
            printf '<div class="entry-desc">Composant principal</div></div></div>'
            printf '</div></main>'
            printf '<footer><a href="../">← Retour à dists</a></footer>'
            printf '</body></html>'
          } > "$REPO/dists/bookworm/index.html"

          # Dynamic dists/bookworm/main/index.html
          mkdir -p "$REPO/dists/bookworm/main"
          {
            printf '<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">'
            printf '<meta name="viewport" content="width=device-width,initial-scale=1.0">'
            printf '<title>dists/bookworm/main — bebznet-suite APT</title>'
            printf '<style>%s</style></head><body>' "$PAGE_CSS"
            printf '<header>'
            printf '<a href="../../../">bebznet-suite APT</a><span class="sep">/</span>'
            printf '<a href="../../">dists</a><span class="sep">/</span>'
            printf '<a href="../">bookworm</a><span class="sep">/</span>'
            printf '<span class="current">main</span>'
            printf '</header>'
            printf '<main><h1>📋 dists/bookworm/main</h1><div class="entry-list">'
            printf '<div class="entry"><span class="entry-icon">📂</span><div>'
            printf '<a href="binary-amd64/">binary-amd64/</a>'
            printf '<div class="entry-desc">Paquets pour architecture amd64</div></div></div>'
            printf '</div></main>'
            printf '<footer><a href="../">← Retour à bookworm</a></footer>'
            printf '</body></html>'
          } > "$REPO/dists/bookworm/main/index.html"

          # Dynamic dists/bookworm/main/binary-amd64/index.html
          mkdir -p "$REPO/dists/bookworm/main/binary-amd64"
          {
            printf '<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">'
            printf '<meta name="viewport" content="width=device-width,initial-scale=1.0">'
            printf '<title>dists/bookworm/main/binary-amd64 — bebznet-suite APT</title>'
            printf '<style>%s</style></head><body>' "$PAGE_CSS"
            printf '<header>'
            printf '<a href="../../../../">bebznet-suite APT</a><span class="sep">/</span>'
            printf '<a href="../../../">dists</a><span class="sep">/</span>'
            printf '<a href="../../">bookworm</a><span class="sep">/</span>'
            printf '<a href="../">main</a><span class="sep">/</span>'
            printf '<span class="current">binary-amd64</span>'
            printf '</header>'
            printf '<main><h1>📋 dists/bookworm/main/binary-amd64</h1><div class="entry-list">'
            printf '<div class="entry"><span class="entry-icon">📄</span><div>'
            printf '<a href="Packages">Packages</a>'
            printf '<div class="entry-desc">Index des paquets (texte brut)</div></div></div>'
            printf '<div class="entry"><span class="entry-icon">📄</span><div>'
            printf '<a href="Packages.gz">Packages.gz</a>'
            printf '<div class="entry-desc">Index des paquets (compressé)</div></div></div>'
            printf '</div></main>'
            printf '<footer><a href="../">← Retour à main</a></footer>'
            printf '</body></html>'
          } > "$REPO/dists/bookworm/main/binary-amd64/index.html"

          # Dynamic pool/main/index.html — lists available .deb files
          {
            printf '<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">'
            printf '<meta name="viewport" content="width=device-width,initial-scale=1.0">'
            printf '<title>pool/main — bebznet-suite APT</title>'
            printf '<style>'
            printf ':root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--accent:#58a6ff;--text:#c9d1d9;--muted:#8b949e}'
            printf '*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}'
            printf 'body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;display:flex;flex-direction:column}'
            printf 'header{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 28px;display:flex;align-items:center;gap:14px}'
            printf 'header a{color:var(--accent);text-decoration:none;font-size:13px}'
            printf 'header a:hover{text-decoration:underline}'
            printf '.sep{color:var(--border)}.current{color:var(--text);font-weight:600}'
            printf 'main{max-width:760px;margin:40px auto;padding:0 20px;flex:1}'
            printf 'h1{font-size:1.5rem;font-weight:700;color:#f0f6fc;margin-bottom:20px}'
            printf '.entry-list{border:1px solid var(--border);border-radius:10px;overflow:hidden}'
            printf '.entry{display:flex;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid var(--border);transition:background .15s}'
            printf '.entry:last-child{border-bottom:none}.entry:hover{background:var(--surface)}'
            printf '.entry-icon{font-size:20px}'
            printf '.entry a{color:var(--accent);text-decoration:none;font-size:14px;font-weight:500}'
            printf '.entry a:hover{text-decoration:underline}'
            printf '.entry-meta{color:var(--muted);font-size:12px;margin-top:2px;font-family:monospace}'
            printf 'footer{text-align:center;padding:24px;border-top:1px solid var(--border);color:var(--muted);font-size:12px}'
            printf 'footer a{color:var(--accent);text-decoration:none}'
            printf '.empty{padding:40px;text-align:center;color:var(--muted)}'
            printf '</style></head><body>'
            printf '<header><a href="../../">bebznet-suite APT</a><span class="sep">/</span>'
            printf '<a href="../">pool</a><span class="sep">/</span>'
            printf '<span class="current">main</span></header>'
            printf '<main><h1>📦 pool/main</h1><div class="entry-list">'
            shopt -s nullglob
            debs=("$REPO/pool/main/"*.deb)
            if [ ${#debs[@]} -eq 0 ]; then
              printf '<div class="empty">Aucun paquet disponible pour le moment.</div>'
            else
              for deb in "${debs[@]}"; do
                name=$(basename "$deb")
                size=$(du -sh "$deb" | cut -f1)
                printf '<div class="entry"><span class="entry-icon">📦</span><div>'
                printf '<a href="%s">%s</a>' "$name" "$name"
                printf '<div class="entry-meta">%s</div></div></div>' "$size"
              done
            fi
            printf '</div></main>'
            printf '<footer><a href="../../">← Retour à l'"'"'accueil</a></footer>'
            printf '</body></html>'
          } > "$REPO/pool/main/index.html"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.REPO }}
          force_orphan: true